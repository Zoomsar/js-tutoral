<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Websait</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="myH1">Interest Calculator</h1>
    
    <form>
        <label for="principal">Principal Amount:</label>
        <input type="number" id="principal"><br><br>

        <label for="rate">Annual Interest Rate (%):</label>
        <input type="number" id="rate"><br><br>

        <label for="time">Time (years):</label>
        <input type="number" id="time"><br><br>

        <button type="button" onclick="calculateInterest()">Calculate Interest</button>

        <p id="result">Total: <span id="total">0.00€</span></p>
    </form>

    <script src="index.js"></script>
</body>
</html>
